# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Build and convert Latex sources

on:
  pull_request:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
      - name: Install texlive and pandoc
        run: |
          sudo apt-get update
          sudo apt-get -y install --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-bibtex-extra \
            texlive-plain-generic \
            texlive-extra-utils \
            texlive-science \
            texlive-pictures \
            texlive-publishers \
            latexmk \
            poppler-utils \
            biber
          wget https://github.com/jgm/pandoc/releases/download/3.6.1/pandoc-3.6.1-1-amd64.deb && sudo dpkg -i pandoc-3.6.1-1-amd64.deb
      - name: Check Latex and Bibtex files
        run: ./compile-latex.sh
      - name: Convert and merge source files
        run: ./convert-and-merge-sources.sh
      - name: Build paper (regular and flattened)
        run: ./compile_and_flatten.sh
        working-directory: llm-guidelines-paper
      - name: Compare regular and flattened PDFs
        run: ./scripts/compare_pdfs.sh emse26-llm-guidelines.pdf emse26-llm-guidelines-flat.pdf
        working-directory: llm-guidelines-paper
      - name: Upload paper PDFs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: paper
          path: |
            llm-guidelines-paper/emse26-llm-guidelines.pdf
            llm-guidelines-paper/emse26-llm-guidelines-flat.pdf
            llm-guidelines-paper/pdf-text.diff
          if-no-files-found: warn
