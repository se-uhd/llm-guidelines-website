name: Update citation counts

on:
  schedule:
    - cron: '17 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ssh-key: ${{ secrets.CITATIONS_DEPLOY_KEY }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml scholarly 'httpx<0.28'

      - name: Fetch citation counts
        run: python scripts/update-citations.py

      - name: Show current citation data
        run: cat _data/citations.yml

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain _data/citations.yml)" ]]; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add _data/citations.yml
            git commit -m "Update Google Scholar citation counts"
            git push
          fi
