title: LLM Guidelines for SE
description: >- # this means to ignore newlines until "theme:"
  Reporting Guidelines for Empirical Studies in Software Engineering involving Large Language Models.
theme: just-the-docs
url: "https://llm-guidelines.org" # the base hostname & protocol for your site, e.g. http://example.com
baseurl: ""
favicon_ico: "/assets/images/favicon.ico"

aux_links_new_tab: false
aux_links:
  <i class="fas fa-fw fa-tag" aria-hidden="true"></i>&NonBreakingSpace;2026.06:
    - https://github.com/se-uhd/llm-guidelines-paper/tree/2026.06
  <i class="fas fa-fw fa-clock-rotate-left" aria-hidden="true"></i>&NonBreakingSpace;Changelog:
    - /changelog/
  <i class="fas fa-fw fa-cube" aria-hidden="true"></i>&NonBreakingSpace;Skill:
    - https://github.com/se-uhd/llm-guidelines-skill
  <i class="fab fa-fw fa-github" aria-hidden="true"></i>&NonBreakingSpace;GitHub:
    - https://github.com/se-uhd/llm-guidelines-website

search_enabled: true

# Footer content
# appears at the bottom of every page's main content

footer_content: "Content provided under <a href=\"https://creativecommons.org/licenses/by/4.0/\">CC BY 4.0</a>. Just the docs theme provided via an <a href=\"https://github.com/just-the-docs/just-the-docs/tree/main/LICENSE.txt\">MIT license.</a>"

callouts:
  important:
    title: Important
    color: red
  announcement:
    title: Announcement
    color: blue
  highlight:
    color: blue

plugins:
  - jekyll-redirect-from

exclude:
  - "AGENTS.md"
  - "CLAUDE.md"
  - "LICENSE"
  - "README.md"
  - "compile-latex.sh"
  - "convert-and-merge-sources.sh"
  - "generate-skill.sh"
  - "header-website.tex"
  - "lint_markdown.yaml"
  - "mise.toml"
  - "pandoc-filters.lua"
  - "scripts"
  - "short-titles.sh"
  - "texput.log"
  - "**/_sources/*"
  - "llm-guidelines-paper"
  - "llm-guidelines-skill"
